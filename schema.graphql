  """check for conversion errors on cast"""
  safe: Boolean! = true

  """JSON scalar; also see typed scalars"""
  value: JSON

  """use kleene logic for booleans"""
  kleene: Boolean! = false

  """check for overflow errors"""
  checked: Boolean! = false
  base64: [Base64!]! = []
