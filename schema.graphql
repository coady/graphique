  datetime: [DateTime!]! = []
  decimal: [Decimal!]! = []
  duration: [Duration!]! = []
  time: [Time!]! = []

  """=="""
  eq: [Expression!]! = []

  """!="""
  ne: [Expression!]! = []

  """<"""
  lt: [Expression!]! = []

  """<="""
  le: [Expression!]! = []

  """\>"""
  gt: [Expression!]! = []

  """\>="""
  ge: [Expression!]! = []

  """~"""
  inv: Expression @optional

  """Calculate the absolute value of the argument element-wise."""
  abs: Expression @optional

  """Add the arguments element-wise."""
  add: [Expression!]! = []

  """Divide the arguments element-wise."""
  divide: [Expression!]! = []

  """Multiply the arguments element-wise."""
  multiply: [Expression!]! = []

  """Negate the argument element-wise."""
  negate: Expression @optional

  """Raise arguments to power element-wise."""
  power: [Expression!]! = []

  """Get the signedness of the arguments element-wise."""
  sign: Expression @optional

  """Subtract the arguments element-wise."""
  subtract: [Expression!]! = []

  """bit-wise functions"""
  bitWise: BitWise @optional

  """rounding functions"""
  rounding: Rounding @optional

  """logarithmic functions"""
  log: Log @optional

  """trigonometry functions"""
  trig: Trig @optional

  """element-wise aggregate functions"""
  elementWise: ElementWise @optional

  """&"""
  and: [Expression!]! = []

  """Logical 'and not' boolean values."""
  andNot: [Expression!]! = []

  """|"""
  or: [Expression!]! = []

  """Logical 'xor' boolean values."""
  xor: [Expression!]! = []

  """utf8 string functions"""
  utf8: Utf8 @optional

  """Classify strings as ASCII."""
  stringIsAscii: Expression @optional

  """match substring functions"""
  substring: MatchSubstring @optional

  """binary functions"""
  binary: Binary @optional

  """set lookup functions"""
  setLookup: SetLookup @optional

  """Return true if value is finite."""
  isFinite: Expression @optional

  """Return true if infinity."""
  isInf: Expression @optional

  """Return true if NaN."""
  isNan: Expression @optional

  """Return true if non-null, else return null."""
