"""a dataset with a derived schema"""
type Table implements Dataset {
  """
  [arrow type](https://arrow.apache.org/docs/python/api/dataset.html#classes)
  """
  type: String!

  """dataset schema"""
  schema: Schema!

  """
  Nullable field to stop error propagation, enabling partial query results.
  
  Will be replaced by client controlled nullability.
  """
  optional: Table

  """number of rows"""
  length: Long!

  """
  Return whether there are at least `length` rows.
  
  May be significantly faster than `length` for out-of-core data.
  """
  any(length: Long! = 1): Boolean!

  """buffer size in bytes; null if table is not loaded"""
  size: Long

  """
  Return column of any type by name.
  
  This is typically only needed for aliased or casted columns.
  If the column is in the schema, `columns` can be used instead.
  """
  column(
    """column name(s); multiple names access nested struct fields"""
    name: [String!]!

    """
    cast array to [arrow type](https://arrow.apache.org/docs/python/api/datatypes.html)
    """
    cast: String! = ""

    """check for conversion errors on cast"""
    safe: Boolean! = true
  ): Column

  """Return zero-copy slice of table."""
  slice(
    """number of rows to skip; negative value skips from the end"""
    offset: Long! = 0

    """maximum number of rows to return"""
    length: Long = null

    """reverse order after slicing; forces a copy"""
    reverse: Boolean! = false
  ): Table!

  """
  Return table grouped by columns.
  
  See `column` for accessing any column which has changed type. See `tables` to split on any
  aggregated list columns.
  """
  group(
    """column names; empty will aggregate into a single row table"""
    by: [String!]! = []

    """optionally include counts in an aliased column"""
    counts: String! = ""

    """aggregation functions applied to other columns"""
    aggregate: HashAggregates! = {}
  ): Table!

  """
  Return table grouped by pairwise differences.
  
  Differs from `group` by relying on adjacency, and is typically faster. Other columns are
  transformed into list columns. See `column` and `tables` to further access lists.
  """
  runs(
    """column names"""
    by: [String!]! = []

    """
    optional predicates to split on; scalars are compared to pairwise difference
    """
    split: [Diff!]! = []

    """optionally include counts in an aliased column"""
    counts: String! = ""
  ): Table!

  """
  Return table slice sorted by specified columns.
  
  Optimized for length == 1; matches min or max values.
  """
  sort(
    """column names; prefix with `-` for descending order"""
    by: [String!]!

    """
    maximum number of rows to return; may be significantly faster but is unstable
    """
    length: Long = null

    """where nulls in input should be sorted; incompatible with `length`"""
    nullPlacement: String! = "at_end"
  ): Table!

  """Return table selected by maximum dense rank."""
  rank(
    """column names; prefix with `-` for descending order"""
    by: [String!]!

    """maximum dense rank to select; optimized for == 1 (min or max)"""
    max: Int! = 1

    """where nulls in input should be ranked"""
    nullPlacement: String! = "at_end"
  ): Table!

  """
  Return view of table with vector functions applied across columns.
  
  Applied functions load arrays into memory as needed. See `scan` for scalar functions,
  which do not require loading.
  """
  apply(
    """Compute the cumulative max over a numeric input."""
    cumulativeMax: [Cumulative!]! = []

    """Compute the cumulative max over a numeric input."""
    cumulativeMean: [Cumulative!]! = []

    """Compute the cumulative min over a numeric input."""
    cumulativeMin: [Cumulative!]! = []

    """Compute the cumulative product over a numeric input."""
    cumulativeProd: [Cumulative!]! = []

    """Compute the cumulative sum over a numeric input."""
    cumulativeSum: [Cumulative!]! = []

    """Carry non-null values backward to fill null slots."""
    fillNullBackward: [Field!]! = []

    """Carry non-null values forward to fill null slots."""
    fillNullForward: [Field!]! = []

    """Compute first order difference of an array."""
    pairwiseDiff: [Pairwise!]! = []

    """Compute numerical ranks of an array (1-based)."""
    rank: [Rank!]! = []

    """functions for list arrays."""
    list: ListFunction! = {}
  ): Table!

  """
  Return table with list arrays flattened.
  
  At least one list column must be referenced, and all list columns must have the same lengths.
  """
  flatten(indices: String! = ""): Table!

  """
  Return a list of tables by splitting list columns.
  
  At least one list column must be referenced, and all list columns must have the same lengths.
  """
  tables: [Table]!

  """Return table with scalar aggregate functions applied to list columns."""
  aggregate(
    """Approximate median of a numeric array with T-Digest algorithm."""
    approximateMedian: [ScalarAggregate!]! = []

    """Count the number of null / non-null values."""
    count: [CountAggregate!]! = []

    """Count the number of unique values."""
    countDistinct: [CountAggregate!]! = []

    """distinct values within each scalar"""
    distinct: [CountAggregate!]! = []

    """first value of each list scalar"""
    first: [Field!]! = []

    """last value of each list scalar"""
    last: [Field!]! = []

    """Compute the minimum or maximum values of a numeric array."""
    max: [ScalarAggregate!]! = []

    """Compute the mean of a numeric array."""
    mean: [ScalarAggregate!]! = []

    """Compute the minimum or maximum values of a numeric array."""
    min: [ScalarAggregate!]! = []

    """Compute the product of values in a numeric array."""
    product: [ScalarAggregate!]! = []

    """Calculate the standard deviation of a numeric array."""
    stddev: [VarianceAggregate!]! = []

    """Compute the sum of a numeric array."""
    sum: [ScalarAggregate!]! = []

    """Approximate quantiles of a numeric array with T-Digest algorithm."""
    tdigest: [TDigestAggregate!]! = []

    """Calculate the variance of a numeric array."""
    variance: [VarianceAggregate!]! = []
  ): Table! @deprecated(reason: "List scalar functions will be moved to `scan(...: {list: ...})`")

  """Select rows and project columns without memory usage."""
  scan(
    """selected rows"""
    filter: Expression! = {}

    """projected columns"""
    columns: [Projection!]! = []
  ): Table!

  """
  Provisional: [join](https://arrow.apache.org/docs/python/generated/pyarrow.dataset.Dataset.html#pyarrow.dataset.Dataset.join) this table with another table on the root Query type.
  """
  join(
    """name of right table; must be on root Query type"""
    right: String!

    """column names used as keys on the left side"""
    keys: [String!]!

    """column names used as keys on the right side; defaults to left side."""
    rightKeys: [String!] = null

    """
    the kind of join: 'left semi', 'right semi', 'left anti', 'right anti', 'inner', 'left outer', 'right outer', 'full outer'
    """
    joinType: String! = "left outer"

    """add suffix to left column names; for preventing collisions"""
    leftSuffix: String! = ""

    """add suffix to right column names; for preventing collisions."""
    rightSuffix: String! = ""

    """omit duplicate keys"""
    coalesceKeys: Boolean! = true
  ): Table! @provisional

  """Select rows from indices."""
  take(indices: [Long!]!): Table!

  """Remove missing values from referenced columns in the table."""
  dropNull: Table!

  """fields for each column"""
  columns: Columns!

  """Return scalar values at index."""
  row(index: Long! = 0): Row

  """
  Return table with rows which match all queries.
  
  See `scan(filter: ...)` for more advanced queries. Additional feature: sorted tables
  support binary search
  """
  filter(latitude: FloatFilter! = {}, longitude: FloatFilter! = {}, state: StrFilter! = {}, city: StrFilter! = {}, county: StrFilter! = {}, zipcode: IntFilter! = {}): Table!
}

